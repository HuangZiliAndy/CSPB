runner:
  total_steps: 100000
  gradient_clipping: 1
  gradient_accumulate_steps: 1
  log_step: 200
  eval_step: 2000
  save_step: 2000
  max_keep: 1
  eval_dataloaders:
    - dev
  evaluate_ratio: 1.0

optimizer:
  name: TorchOptim
  torch_optim_name: AdamW
  lr: 1.0e-3

# comment the whole scheduler config block
# to disable learning rate scheduling
# scheduler:
#   name: linear_schedule_with_warmup
#   num_warmup_steps: 1400
# comment the whole specaug config block
# to disable specaug on representation

specaug:
  adaptive: false
  adaptive_number_ratio: 0.04
  adaptive_size_ratio: 0.04
  max_n_time_masks: 20
  apply_time_warp: true
  apply_time_mask: true
  apply_freq_mask: true
  time_warp_window: 5
  time_mask_width_range: [0, 40]
  freq_mask_width_range: [0, 50]
  num_freq_mask: 4
  num_time_mask: 2

downstream_expert:
  datarc:
    channel: "0"
    max_samples: 480000
    normalize: True
    zero_infinity: True
    dict_path: 'downstream/asr_ami/char.dict'

    decoder_args:
      # See https://github.com/facebookresearch/flashlight/blob/master/flashlight/lib/text/decoder/LexiconDecoder.h#L20
      # for what the options mean. Python binding exposes the same options from C++.
      # KenLM is a fast LM query implementation, and it can be powered by:
      # 1. official LibriSpeech 4-gram LM: the 4-gram.arpa file on http://www.openslr.org/11
      # 2. fairseq style, letter-based lexicon: https://dl.fbaipublicfiles.com/fairseq/wav2vec/librispeech_lexicon.lst
      decoder_type: 'None'
      nbest: 1
      criterion: "ctc"
      beam: 5
      beam_threshold: 25
      kenlm_model: 'downstream/asr_ami/lm/4-gram.arpa'
      lexicon: 'downstream/asr_ami/lexicon.lst'
      lm_weight: 2
      word_score: -1
      unk_weight: -math.inf

  loaderrc:
    num_workers: 16
    train_batchsize: 32
    eval_batchsize: 1
    train_dir: /export/c02/hzili1/datasets/s3prl_csp/downstream/asr_ami/SDM1/train_filter
    dev_dir: /export/c02/hzili1/datasets/s3prl_csp/downstream/asr_ami/SDM1/dev_filter
    test_dir: /export/c02/hzili1/datasets/s3prl_csp/downstream/asr_ami/SDM1/test

  modelrc:
    project_dim: 512
    select: LSTMASRModel
    LSTMASRModel:
      d_model: 512
      bidirectional: True
      dropout: 0.1
      num_layers: 2
